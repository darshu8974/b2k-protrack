# Protrack — Render Blueprint (Infrastructure as Code).
#
# Deploys the two backend services to Render as Docker web services:
#   - protrack-api  (Spring Boot)  -> apps/api/Dockerfile
#   - protrack-ai   (FastAPI)      -> apps/ai/Dockerfile
#
# NOT managed here (per the approved Phase-1 stack):
#   - PostgreSQL  -> Neon (external managed Postgres; set DATABASE_* below to the Neon connection).
#   - Web (React) -> Vercel (built from apps/web; point VITE_API_URL at the protrack-api URL).
#
# Secrets are never committed: env vars marked `sync: false` must be filled in the Render
# dashboard (or via `render env`), and PROTRACK_JWT_SECRET is generated by Render.
#
# Apply from the repo root:  Render Dashboard -> Blueprints -> New -> point at this file.

services:
  # ─────────────────────────────── Spring Boot API ───────────────────────────────
  - type: web
    name: protrack-api
    runtime: docker
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: starter
    healthCheckPath: /api/v1/health
    autoDeploy: true
    # Persistent disk for local file-storage blobs (Phase 1). Swap to S3 later.
    disk:
      name: protrack-storage
      mountPath: /app/local-storage
      sizeGB: 1
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Neon PostgreSQL (JDBC form, direct host, ?sslmode=require). Set in the dashboard.
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      # Signing secret for JWTs — generated once by Render, never in the repo.
      - key: PROTRACK_JWT_SECRET
        generateValue: true
      # The AI service URL (set to the protrack-ai service's URL after first deploy).
      - key: PROTRACK_AI_BASE_URL
        sync: false
      # Shared internal secret; MUST equal protrack-ai's AI_INTERNAL_KEY.
      - key: PROTRACK_AI_INTERNAL_KEY
        sync: false
      - key: PROTRACK_STORAGE_DRIVER
        value: local
      - key: PROTRACK_STORAGE_LOCAL_PATH
        value: /app/local-storage
      # Phase-1 default: log-only mail adapter (no SMTP required). Set true + spring.mail.* for real email.
      - key: PROTRACK_MAIL_ENABLED
        value: "false"

  # ──────────────────────────────── FastAPI AI service ────────────────────────────────
  - type: web
    name: protrack-ai
    runtime: docker
    branch: main
    dockerfilePath: apps/ai/Dockerfile
    dockerContext: apps/ai
    plan: starter
    healthCheckPath: /internal/v1/health
    autoDeploy: true
    envVars:
      - key: AI_ENVIRONMENT
        value: prod
      # Deterministic mock by default. To enable real Claude: set AI_PROVIDER=claude + ANTHROPIC_API_KEY.
      - key: AI_PROVIDER
        value: mock
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_CLAUDE_MODEL
        value: claude-sonnet-4-6
      # Shared internal secret; MUST equal protrack-api's PROTRACK_AI_INTERNAL_KEY.
      - key: AI_INTERNAL_KEY
        sync: false
      # The API URL for progress callbacks (set to the protrack-api service's URL after first deploy).
      - key: AI_SPRING_CALLBACK_BASE_URL
        sync: false
