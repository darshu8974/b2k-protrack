# Datasource is configured in application.yml via DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD
# (set these as environment variables on Render too).
spring:
  jpa:
    show-sql: false

server:
  forward-headers-strategy: framework   # respect Render's proxy headers

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.protrack: INFO
