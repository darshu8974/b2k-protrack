spring:
  application:
    name: protrack-api
  profiles:
    default: local
  # Datasource — Neon PostgreSQL, supplied entirely via environment variables.
  # Never hardcode credentials here. Set DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD.
  # Empty defaults let the Testcontainers integration test inject its own connection.
  datasource:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none          # schema is owned by Flyway, never by Hibernate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ───────────── Protrack typed configuration (see ProtrackProperties) ─────────────
protrack:
  version: 0.1.0
  jwt:
    secret: ${PROTRACK_JWT_SECRET:dev-only-change-me-please-min-32-bytes-long}
    access-ttl: PT15M
    refresh-ttl: P7D
  storage:
    driver: ${PROTRACK_STORAGE_DRIVER:local}
    local-path: ${PROTRACK_STORAGE_LOCAL_PATH:./local-storage}
  ai:
    base-url: ${PROTRACK_AI_BASE_URL:http://localhost:8000}
    internal-key: ${PROTRACK_AI_INTERNAL_KEY:dev-internal-key}
    timeout-ms: ${PROTRACK_AI_TIMEOUT_MS:120000}
  mail:
    from: ${PROTRACK_MAIL_FROM:no-reply@protrack.app}
