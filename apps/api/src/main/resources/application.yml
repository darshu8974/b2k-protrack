spring:
  application:
    name: protrack-api
  profiles:
    default: local

  datasource:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 210MB

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}

management:
  health:
    mail:
      enabled: ${PROTRACK_MAIL_ENABLED:false}

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db,storage

  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  retry:
    instances:
      aiService:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        retry-exceptions:
          - com.protrack.ai.client.AiServiceUnavailableException
          - org.springframework.web.client.ResourceAccessException

  circuitbreaker:
    instances:
      aiService:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        record-exceptions:
          - com.protrack.ai.client.AiServiceUnavailableException
          - org.springframework.web.client.ResourceAccessException

protrack:
  version: 0.1.0

  jwt:
    secret: ${PROTRACK_JWT_SECRET:dev-only-change-me-please-min-32-bytes-long}
    access-ttl: PT15M
    refresh-ttl: P7D

  storage:
    driver: ${PROTRACK_STORAGE_DRIVER:local}
    local-path: ${PROTRACK_STORAGE_LOCAL_PATH:./local-storage}

  ai:
    base-url: ${PROTRACK_AI_BASE_URL:http://localhost:8000}
    internal-key: ${PROTRACK_AI_INTERNAL_KEY:dev-internal-key}
    timeout-ms: ${PROTRACK_AI_TIMEOUT_MS:120000}

    rate-limit:
      requests-per-minute: ${PROTRACK_AI_RATE_LIMIT_RPM:30}

  mail:
    enabled: ${PROTRACK_MAIL_ENABLED:false}
    from: ${PROTRACK_MAIL_FROM:no-reply@protrack.app}

  reporting:
    snapshot-cron: ${PROTRACK_REPORTING_SNAPSHOT_CRON:0 0 2 * * *}

logging:
  level:
    root: INFO
    org.springframework.beans.factory.support: DEBUG
    org.springframework.context.support: DEBUG
    org.springframework.boot: INFO