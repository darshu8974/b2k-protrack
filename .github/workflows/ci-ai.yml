name: ci-ai

on:
  push:
    branches: [main]
    paths:
      - "apps/ai/**"
      - ".github/workflows/ci-ai.yml"
  pull_request:
    paths:
      - "apps/ai/**"
      - ".github/workflows/ci-ai.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/ai/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Typecheck (mypy)
        run: mypy app

      # Tests use the deterministic mock provider by default — no Claude key required.
      - name: Unit tests (pytest)
        run: pytest
